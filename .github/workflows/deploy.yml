name: Deploy Chess Replay

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      env:
        VITE_BASE_PATH: /chess  # Change this based on your deployment path
        
    - name: Create models directory in dist
      run: mkdir -p dist/models
      
    # Option 1: Deploy to GitHub Pages
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        publish_branch: gh-pages
        
    # Option 2: Deploy to Vercel (uncomment if using)
    # - name: Deploy to Vercel
    #   uses: amondnet/vercel-action@v25
    #   with:
    #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
    #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
    #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
    #     working-directory: ./
        
    # Option 3: Deploy to custom server via SSH (uncomment if using)
    # - name: Deploy to Server via SSH
    #   uses: appleboy/scp-action@v0.1.7
    #   with:
    #     host: ${{ secrets.SSH_HOST }}
    #     username: ${{ secrets.SSH_USERNAME }}
    #     key: ${{ secrets.SSH_PRIVATE_KEY }}
    #     source: "dist/*"
    #     target: "/var/www/thearunmurali.com/chess"
    #     strip_components: 1
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: chess-replay-dist
        path: dist/
        retention-days: 7
