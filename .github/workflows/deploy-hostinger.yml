name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application (subdomain root)
      run: npm run build
      env:
        VITE_BASE_PATH: /

    - name: Verify dist/ exists
      run: |
        ls -la dist
        test -f dist/index.html

    - name: Ensure target dir exists (SSH)
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.HOSTINGER_FTP_HOST }}
        username: ${{ secrets.HOSTINGER_FTP_USER }}
        key: ${{ secrets.SSH }}
        port: 22
        script: |
          mkdir -p /public_html/chess
          ls -la /public_html/chess

    - name: Deploy to Hostinger via SFTP (SCP)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOSTINGER_FTP_HOST }}
        username: ${{ secrets.HOSTINGER_FTP_USER }}
        key: ${{ secrets.SSH }}
        port: 22
        source: "dist/*"
        target: "/public_html/chess/"
        strip_components: 1
        overwrite: true

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: chess-replay-dist
        path: dist/
        retention-days: 7
