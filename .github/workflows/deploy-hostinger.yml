name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application (subdomain root)
      run: npm run build
      env:
        VITE_BASE_PATH: /

    - name: Verify dist/ exists
      run: |
        ls -la dist
        test -f dist/index.html

    - name: Ensure target dir exists (SSH)
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.HOSTINGER_FTP_HOST }}
        username: ${{ secrets.HOSTINGER_FTP_USER }}
        key: ${{ secrets.SSH }}
        port: 22
        script: |
          mkdir -p /public_html/chess
          ls -la /public_html/chess

    - name: Deploy to Hostinger via SFTP (SCP)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOSTINGER_FTP_HOST }}
        username: ${{ secrets.HOSTINGER_FTP_USER }}
        key: ${{ secrets.SSH }}
        port: 22
        source: "dist/*"
        target: "/public_html/chess/"
        strip_components: 1
        overwrite: true

    - name: Deploy chess-backend on VPS
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.HOSTINGER_FTP_HOST }}
        username: ${{ secrets.HOSTINGER_FTP_USER }}
        key: ${{ secrets.SSH }}
        port: 22
        envs: LITELLM_KEY,LITELLM_URL
        script: |
          # Clone repo if first time, otherwise pull latest
          if [ ! -d /root/chess-backend ]; then
            git clone https://github.com/murali-arun/webgpu-chess-replay.git /root/chess-backend
          fi
          cd /root/chess-backend
          git pull origin main

          # Write .env (no heredoc — avoids indentation issues)
          printf 'LITELLM_KEY=%s\nLITELLM_URL=%s\nLITELLM_MODEL=gpt-4o\n' \
            "$LITELLM_KEY" "$LITELLM_URL" > .env

          # Rebuild and restart only the backend container
          docker compose up -d --build chess-backend
          docker ps --filter name=chess_backend
