services:
  # Static frontend (nginx serving built dist/)
  webgpu-chess:
    build:
      context: .
      target: frontend
    container_name: chess_static
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - default

  # Lesson-generation backend (server.js)
  chess-backend:
    build:
      context: .
      target: backend
    container_name: chess_backend
    restart: unless-stopped
    env_file: .env          # LITELLM_KEY, LITELLM_URL, LITELLM_MODEL
    volumes:
      - lessons_data:/app/lessons-input   # single volume covers all subfolders — no cross-device rename
      - generated_lessons:/app/src/lessons
    networks:
      - default
      - litellm_net

volumes:
  lessons_data:
  generated_lessons:

networks:
  default:
    name: npm_default
    external: true
  litellm_net:
    name: litellm_default
    external: true
